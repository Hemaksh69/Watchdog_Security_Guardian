name: Secret Detection Scan
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Execute Secret Scan
        run: |
          # Use the correct path to the folder where the script lives
          chmod +x ./Watchdog/watchdog.sh
          
          # Run the script from the root, targeting the current directory
          if ./Watchdog/watchdog.sh .; then
            echo "✅ No secrets found."
          else
            echo "::error::Hardcoded secrets detected! Build failed."
            exit 1
          fi
