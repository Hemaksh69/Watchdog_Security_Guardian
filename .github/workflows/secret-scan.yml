name: Secret Detection Scan
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute Secret Scan
        run: |
          # The files are already here, just make the script executable
          chmod +x ./watchdog.sh
          
          # Run the script on the current directory
          if ./watchdog.sh .; then
            echo "✅ No secrets found."
          else
            echo "::error::Hardcoded secrets detected! Build failed."
            exit 1
          fi
