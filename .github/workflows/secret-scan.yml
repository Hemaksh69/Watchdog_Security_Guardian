name: Secret Detection Scan
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone Watchdog Security Guardian
        run: git clone https://github.com/Hemaksh69/Watchdog_Security_Guardian.git

      - name: Execute Secret Scan
        run: |
          chmod +x Watchdog_Security_Guardian/watchdog.sh
          # The script exits with a non-zero code if secrets are found
          if Watchdog_Security_Guardian/watchdog.sh .; then
            echo "✅ No secrets found."
          else
            echo "::error::Hardcoded secrets detected! Build failed."
            exit 1
          fi
